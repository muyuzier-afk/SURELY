name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      
      - name: Read version from ver file
        id: get_version
        run: echo "VERSION=$(cat ver)" >> $GITHUB_OUTPUT
      
      - name: Build surely-server
        run: go build -o surely-server ./cmd/surely-server
      
      - name: Build surely-client
        run: go build -o surely-client ./cmd/surely-client
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: |
            surely-server
            surely-client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
